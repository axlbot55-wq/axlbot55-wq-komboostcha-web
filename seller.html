<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Komboostcha Seller Access</title>
  <style>
    :root{--bg:#f6efe4;--panel:#fffdf9;--line:rgba(49,75,56,0.1);--moss:#314b38;--ink:#1d241e;--muted:#6b756d;--accent:#b97833}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent 28%),linear-gradient(135deg,#f5ecde 0%,#efe1cc 48%,#e6d5bc 100%);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:min(100%,420px);background:rgba(255,253,249,0.92);border:1px solid rgba(255,255,255,0.7);border-radius:28px;padding:28px;box-shadow:0 24px 60px rgba(29,36,30,0.14);backdrop-filter:blur(10px)}
    .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px}
    h1{font-family:Georgia,serif;font-size:2.2rem;line-height:.98;margin:0 0 10px;color:var(--moss)}
    p{color:var(--muted);line-height:1.65;margin:0 0 18px}
    label{display:block;margin:0 0 8px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
    input{width:100%;border-radius:18px;border:1px solid var(--line);padding:16px;text-align:center;letter-spacing:.24em;font-size:1.35rem;margin-bottom:12px;background:#fff}
    button, a.link{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:14px 18px;border-radius:999px;border:none;background:var(--moss);color:#fff;font-weight:700;text-decoration:none;cursor:pointer}
    .secondary{margin-top:10px;background:transparent;color:var(--moss);border:1px solid rgba(49,75,56,0.18)}
    .error{display:none;color:#9d5c18;font-size:13px;font-weight:700;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Owner console</div>
    <h1>Seller access</h1>
    <p>Enter the seller PIN to open the Komboostcha operations console.</p>
    <label for="pin">Seller PIN</label>
    <input id="pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••">
    <div class="error" id="error">Incorrect PIN. Try again.</div>
    <button id="unlock">Open seller console</button>
    <a class="link secondary" href="./index.html">Back to storefront</a>
  </div>
  <script src="./config.js"></script>
  <script>
    const cfg = window.KOMBOOSTCHA_CONFIG || {};
    const SELLER_PIN = String(cfg.sellerPin || '2025');
    const STORE_UNLOCK = 'komboostcha_seller_unlocked_v3';
    function unlock(){
      const pin=document.getElementById('pin').value.trim();
      if(pin===SELLER_PIN){
        localStorage.setItem(STORE_UNLOCK,'1');
        location.href='./index.html?seller=1';
      } else {
        document.getElementById('pin').value='';
        const err=document.getElementById('error');
        err.style.display='block';
        setTimeout(()=>err.style.display='none',2000);
      }
    }
    document.getElementById('unlock').addEventListener('click', unlock);
    document.getElementById('pin').addEventListener('keydown', (e)=>{ if(e.key==='Enter') unlock(); });
    if(localStorage.getItem(STORE_UNLOCK)==='1') location.href='./index.html?seller=1';
  </script>
</body>
</html>
